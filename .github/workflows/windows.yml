name: Windows Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Create vcpkg binary cache dir
        run: New-Item -ItemType Directory -Force -Path "C:\vcpkg-archives" | Out-Null
        shell: pwsh

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: C:\vcpkg-archives
          key: vcpkg-cache-test-libpng-v2
          restore-keys: vcpkg-cache-test-libpng-

      - name: Show cache status
        run: |
          if ("${{ steps.vcpkg-cache.outputs.cache-hit }}" -eq "true") {
            Write-Host "### CACHE HIT"
          } else {
            Write-Host "### CACHE MISS - will build and save"
          }
          Get-ChildItem "C:\vcpkg-archives" -ErrorAction SilentlyContinue | Select-Object Name
        shell: pwsh

      - name: Install libpng via vcpkg
        env:
          VCPKG_DEFAULT_BINARY_CACHE: C:\vcpkg-archives
        run: vcpkg install --classic --triplet x64-windows-static libpng
        shell: pwsh

      - name: Intentional failure to test cache-save on failure
        run: exit 1
        shell: pwsh

      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: C:\vcpkg-archives
          key: vcpkg-cache-test-libpng-v2
