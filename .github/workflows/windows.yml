name: Windows Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg installed packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-static-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-x64-windows-static-

      - name: Install dependencies via vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: |
          vcpkg install --classic --triplet x64-windows-static `
            cairo `
            boost-filesystem boost-system boost-thread boost-regex `
            boost-serialization boost-date-time boost-timer boost-chrono `
            boost-program-options boost-log `
            lua `
            cppunit
        shell: pwsh

      - name: Configure
        run: |
          cmake -S . -B build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DVCPKG_MANIFEST_MODE=OFF `
            -DCMAKE_BUILD_TYPE=Release `
            -DSAMBAG_VST_SUPPORT=OFF `
            -DSAMBAG_BUILD_TESTS=ON `
            -DSAMBAG_BUILD_TESTAPP=OFF `
            -DSAMBAG_USE_LOG=ON `
            -DSAMBAG_STATIC_DEPS=ON
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release --parallel
        shell: pwsh

      - name: Run tests
        working-directory: ${{ github.workspace }}
        run: .\build\src\Release\unit_tests.exe
        shell: pwsh
