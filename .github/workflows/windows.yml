name: Windows Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Create vcpkg binary cache dir
        run: New-Item -ItemType Directory -Force -Path "C:\vcpkg-archives" | Out-Null
        shell: pwsh

      - name: Cache vcpkg binary archives
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: C:\vcpkg-archives
          key: vcpkg-cache-test-zlib-v1
          save-always: true

      - name: Show cache status
        run: |
          if ("${{ steps.vcpkg-cache.outputs.cache-hit }}" -eq "true") {
            Write-Host "### CACHE HIT - archives were restored, vcpkg will skip building"
          } else {
            Write-Host "### CACHE MISS - building zlib, cache will be saved afterwards"
          }
          Write-Host "Archives dir contents:"
          Get-ChildItem "C:\vcpkg-archives" -ErrorAction SilentlyContinue | Select-Object Name
        shell: pwsh

      - name: Install zlib via vcpkg
        env:
          VCPKG_DEFAULT_BINARY_CACHE: C:\vcpkg-archives
        run: vcpkg install --classic --triplet x64-windows-static zlib
        shell: pwsh

      - name: Show archives after install
        run: |
          Write-Host "Archives dir after install:"
          Get-ChildItem "C:\vcpkg-archives" | Select-Object Name, Length
        shell: pwsh
