name: Windows Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    - cron: '0 6 * * 1'  # every Monday 06:00 UTC — keeps vcpkg cache alive (7-day expiry)

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Create vcpkg binary cache dir
        run: New-Item -ItemType Directory -Force -Path "C:\vcpkg-archives" | Out-Null
        shell: pwsh

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: C:\vcpkg-archives
          key: vcpkg-archives-x64-windows-static-${{ hashFiles('.github/workflows/windows.yml') }}
          restore-keys: vcpkg-archives-x64-windows-static-

      - name: Install dependencies via vcpkg
        env:
          VCPKG_DEFAULT_BINARY_CACHE: C:\vcpkg-archives
        run: |
          vcpkg install --classic --triplet x64-windows-static `
            cairo lua cppunit boost
        shell: pwsh

      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: C:\vcpkg-archives
          key: vcpkg-archives-x64-windows-static-${{ hashFiles('.github/workflows/windows.yml') }}

      - name: Configure
        run: |
          cmake -S . -B build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DVCPKG_MANIFEST_MODE=OFF `
            -DCMAKE_BUILD_TYPE=Release `
            -DSAMBAG_VST_SUPPORT=OFF `
            -DSAMBAG_BUILD_TESTS=ON `
            -DSAMBAG_BUILD_TESTAPP=OFF `
            -DSAMBAG_USE_LOG=ON `
            -DSAMBAG_STATIC_DEPS=ON
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release --parallel
        shell: pwsh

      - name: Run tests
        working-directory: ${{ github.workspace }}
        run: .\build\src\Release\unit_tests.exe
        shell: pwsh

      - name: Configure prebuilt (SAMBAG_USE_LOG=OFF for ABI compatibility)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          cmake -S . -B build-dist `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DVCPKG_MANIFEST_MODE=OFF `
            -DCMAKE_BUILD_TYPE=Release `
            -DSAMBAG_VST_SUPPORT=OFF `
            -DSAMBAG_BUILD_TESTS=OFF `
            -DSAMBAG_BUILD_TESTAPP=OFF `
            -DSAMBAG_USE_LOG=OFF `
            -DSAMBAG_STATIC_DEPS=ON
        shell: pwsh

      - name: Build prebuilt
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: cmake --build build-dist --config Release --parallel
        shell: pwsh

      - name: Install (cmake --install)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: cmake --install build-dist --config Release --prefix dist
        shell: pwsh

      - name: Package
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: Compress-Archive -Path dist\* -DestinationPath sambag-windows-x64-static.zip
        shell: pwsh

      - name: Publish prebuilt release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view prebuilt-latest 2>$null `
            || gh release create prebuilt-latest `
                 --title "Prebuilt binaries (latest master)" `
                 --notes "Auto-generated prebuilt package — do not edit manually."
          gh release upload prebuilt-latest sambag-windows-x64-static.zip --clobber
        shell: pwsh
